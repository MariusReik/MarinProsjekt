# Build images, push to GHCR, then deploy on the VPS via SSH.
# Required repo secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ingest
        uses: docker/build-push-action@v6
        with:
          context: ingest
          push: true
          tags: |
            ghcr.io/mariusreik/marinprosjekt-ingest:latest
            ghcr.io/mariusreik/marinprosjekt-ingest:${{ github.sha }}

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ghcr.io/mariusreik/marinprosjekt-api:latest
            ghcr.io/mariusreik/marinprosjekt-api:${{ github.sha }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          tags: |
            ghcr.io/mariusreik/marinprosjekt-web:latest
            ghcr.io/mariusreik/marinprosjekt-web:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/marin/infra
            git -C /opt/marin pull --ff-only
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
