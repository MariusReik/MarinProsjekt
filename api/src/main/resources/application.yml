spring:
  application:
    name: api
  datasource:
    url: jdbc:postgresql://localhost:5432/marin
    username: marin
    password: marin
  flyway:
    # infra/initdb already bootstraps the schema in dev (see decision log
    # 2026-07-08). Flyway only baselines that state and owns V2+ from here.
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Schema bootstrapped by infra/initdb"

app:
  websocket:
    # How often PositionBroadcastService (#8) polls ais_positions for rows
    # newer than the last broadcast. Small window keeps the query cheap —
    # it only touches the newest hypertable chunk(s).
    broadcast-interval-ms: 2000
  anomaly:
    # AIS gap-detection background job (week 6). See GapDetectionService.
    gap-check-interval-ms: 60000    # how often the rule runs
    gap-threshold-minutes: 30       # silence before a disappearance is a gap
    lookback-hours: 12              # only recently-active vessels are considered
    radius-meters: 1000             # proximity to a locality that counts (brief §25)

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    no.marinplattform: INFO
