services:
  postgres:
    # timescaledb-ha bundles TimescaleDB + PostGIS (both required by v1 scope)
    image: timescale/timescaledb-ha:pg16
    container_name: marin-postgres
    environment:
      POSTGRES_DB: marin
      POSTGRES_USER: marin
      POSTGRES_PASSWORD: marin
    ports:
      - '5432:5432'
    volumes:
      # timescaledb-ha keeps PGDATA here, not in /var/lib/postgresql/data
      - postgres-data:/home/postgres/pgdata/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U marin -d marin']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
