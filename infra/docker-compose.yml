version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: marin-postgres
    environment:
      POSTGRES_DB: marin
      POSTGRES_USER: marin
      POSTGRES_PASSWORD: marin
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
